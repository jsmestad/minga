name: Minga
options:
  bundleIdPrefix: com.minga
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Workaround: macOS 26 beta cryptex bug prevents Metal toolchain auto-mount.
    # Remove once `metal --version` works without this (check Xcode Settings > Components).
    TOOLCHAINS: com.apple.dt.toolchain.Metal.32023.864

packages:
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector
    from: "0.10.3"

targets:
  Minga:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: .generated/protocol/ProtocolOpcodes.generated.swift
        name: ProtocolOpcodes.generated.swift
        type: file
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_NAME: Minga
        PRODUCT_BUNDLE_IDENTIFIER: com.minga.editor
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
        MTL_LANGUAGE_REVISION: UseDeploymentTarget
    dependencies: []
    preBuildScripts:
      - name: Generate protocol opcodes
        script: |
          cd "${SRCROOT}/.."
          if ! command -v mix >/dev/null 2>&1; then
            echo "error: mix is required to generate protocol artifacts. Install Elixir, then run: mix protocol.gen"
            exit 1
          fi
          mix protocol.gen
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/.generated/protocol/ProtocolOpcodes.generated.swift
    postCompileScripts:
      - name: Copy CLI launcher
        script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin"
          cp "${SRCROOT}/Resources/bin/minga" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin/minga"
          chmod +x "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin/minga"
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(SRCROOT)/Resources/bin/minga
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/bin/minga
    postBuildScripts:
      - name: Codesign
        script: |
          codesign --force --deep --sign - "${BUILT_PRODUCTS_DIR}/${FULL_PRODUCT_NAME}"
        basedOnDependencyAnalysis: false

  MingaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
      - path: Sources
        type: group
        excludes:
          - "MingaApp.swift"
      - path: .generated/protocol/ProtocolOpcodes.generated.swift
        name: ProtocolOpcodes.generated.swift
        type: file
    settings:
      base:
        PRODUCT_NAME: MingaTests
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - package: ViewInspector
    preBuildScripts:
      - name: Generate protocol opcodes
        script: |
          cd "${SRCROOT}/.."
          if ! command -v mix >/dev/null 2>&1; then
            echo "error: mix is required to generate protocol artifacts. Install Elixir, then run: mix protocol.gen"
            exit 1
          fi
          mix protocol.gen
        basedOnDependencyAnalysis: false

schemes:
  Minga:
    build:
      targets:
        Minga: all
        MingaTests: [test]
    test:
      targets:
        - MingaTests
