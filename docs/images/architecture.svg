<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="720" height="320" rx="12" fill="#0d1117"/>

  <!-- BEAM box -->
  <rect x="30" y="30" width="280" height="220" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="30" y="30" width="280" height="40" rx="10" fill="#1f6feb" opacity="0.15"/>
  <rect x="30" y="60" width="280" height="1" fill="#30363d"/>
  <text x="170" y="56" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="600">BEAM (Elixir/Erlang VM)</text>
  <text x="50" y="92" fill="#c9d1d9" font-size="12.5">Buffers, undo history</text>
  <text x="50" y="114" fill="#c9d1d9" font-size="12.5">Modes, keybindings</text>
  <text x="50" y="136" fill="#c9d1d9" font-size="12.5">Commands, search</text>
  <text x="50" y="158" fill="#c9d1d9" font-size="12.5">File picker, marks</text>
  <text x="50" y="180" fill="#c9d1d9" font-size="12.5">Syntax highlighting</text>
  <text x="50" y="202" fill="#c9d1d9" font-size="12.5">Plugin / agent hosting</text>

  <!-- Zig box -->
  <rect x="410" y="30" width="280" height="220" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="410" y="30" width="280" height="40" rx="10" fill="#f0883e" opacity="0.15"/>
  <rect x="410" y="60" width="280" height="1" fill="#30363d"/>
  <text x="550" y="56" text-anchor="middle" fill="#f0883e" font-size="14" font-weight="600">Zig + libvaxis</text>
  <text x="430" y="92" fill="#c9d1d9" font-size="12.5">Terminal rendering</text>
  <text x="430" y="114" fill="#c9d1d9" font-size="12.5">Input capture</text>
  <text x="430" y="136" fill="#c9d1d9" font-size="12.5">Screen drawing</text>
  <text x="430" y="158" fill="#c9d1d9" font-size="12.5">Floating panels</text>
  <text x="430" y="180" fill="#c9d1d9" font-size="12.5">Tree-sitter parsing</text>

  <!-- Arrow: render commands (left to right) -->
  <line x1="310" y1="115" x2="410" y2="115" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="360" y="108" text-anchor="middle" fill="#8b949e" font-size="10.5">render commands</text>

  <!-- Arrow: keyboard events (right to left) -->
  <line x1="410" y1="160" x2="310" y2="160" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="360" y="153" text-anchor="middle" fill="#8b949e" font-size="10.5">keyboard events</text>

  <!-- Protocol label -->
  <rect x="220" y="275" width="280" height="30" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="295" text-anchor="middle" fill="#8b949e" font-size="11">Port protocol · length-prefixed binary · stdin/stdout</text>

  <!-- Dashed lines to protocol label -->
  <line x1="310" y1="250" x2="310" y2="275" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="410" y1="250" x2="410" y2="275" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0883e"/>
    </marker>
  </defs>
</svg>