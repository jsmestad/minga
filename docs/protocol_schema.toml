# Minga port protocol opcode registry.
# This is the single source of truth for generated opcode constants across Elixir, Swift, and Zig.

version = "1.0.0"
description = "Minga port protocol opcode registry"

# Directions:
# - frontend_to_beam: emitted by a frontend or parser process and decoded by the BEAM
# - beam_to_frontend: emitted by the BEAM and decoded by a frontend process
# - beam_to_parser: emitted by the BEAM and decoded by the parser process
# - parser_to_beam: emitted by the parser process and decoded by the BEAM

# Input events and shared frontend/parser responses.
[[opcodes]]
category = "input"
name = "key_press"
value = 0x01
direction = "frontend_to_beam"

[[opcodes]]
category = "input"
name = "resize"
value = 0x02
direction = "frontend_to_beam"

[[opcodes]]
category = "input"
name = "ready"
value = 0x03
direction = "frontend_to_beam"

