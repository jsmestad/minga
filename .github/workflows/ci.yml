name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-

      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict

  test:
    name: Test (Elixir)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-

      - run: mix deps.get
      - run: mix deps.compile
      - run: mix test --warnings-as-errors --exclude system_clipboard

  test-zig:
    name: Test (Zig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run Zig tests
        run: cd zig && zig build test

  swift:
    name: Swift (macOS GUI)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: macos/DerivedData
          key: xcode-${{ runner.os }}-${{ hashFiles('macos/Sources/**/*.swift', 'macos/Sources/**/*.metal', 'macos/project.yml') }}
          restore-keys: xcode-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd macos && xcodegen generate

      - name: Build
        run: |
          cd macos
          xcodebuild build \
            -scheme Minga \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          cd macos
          xcodebuild test \
            -scheme Minga \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

  swift-integration:
    name: Swift Protocol Integration
    runs-on: macos-15
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: integration-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: integration-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-

      - run: mix deps.get

      - name: Build Swift test harness
        run: mix swift.harness

      - name: Run BEAM-to-Swift protocol integration tests
        run: mix test test/minga/integration/gui_protocol_test.exs --include swift_harness

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # Separate cache from test jobs: dialyzer needs _build/dev, not _build/test.
      # The PLT and compiled deps are both under _build/dev.
      - name: Cache deps & PLT
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/dev
          key: dialyzer-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: dialyzer-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-

      - run: mix deps.get
      - run: mix dialyzer

  docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-

      - run: mix deps.get
      - run: MIX_ENV=dev mix docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: doc/
      - id: deployment
        uses: actions/deploy-pages@v4
