name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  MIX_ENV: prod
  ELIXIR_VERSION: "1.19.5"
  OTP_VERSION: "28.3.3"
  ZIG_VERSION: "0.15.2"

jobs:
  # ── Gate: validate tag matches mix.exs version ─────────────────────────
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches mix.exs version
        id: check
        run: |
          # Extract version from mix.exs @version attribute
          mix_version=$(grep -oP '@version\s+"\K[^"]+' mix.exs)
          tag_version="${GITHUB_REF_NAME#v}"

          echo "mix.exs version: $mix_version"
          echo "Tag version:     $tag_version"

          if [ "$mix_version" != "$tag_version" ]; then
            echo "::error::Version mismatch! mix.exs has '$mix_version' but tag is 'v$tag_version'"
            exit 1
          fi

          # Detect pre-release: any tag with a hyphen after semver (v1.2.3-rc.1)
          if [[ "$tag_version" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release: $tag_version"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Detected stable release: $tag_version"
          fi

  # ── Gate: CI must pass ─────────────────────────────────────────────────
  ci:
    name: CI (${{ matrix.job }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        job: [lint, test, dialyzer]
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ci-deps-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: ci-deps-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache PLT
        if: matrix.job == 'dialyzer'
        uses: actions/cache@v4
        with:
          path: _build/dev/dialyxir_*.plt*
          key: plt-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: plt-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - run: mix deps.get

      - name: Lint
        if: matrix.job == 'lint'
        run: |
          mix format --check-formatted
          mix credo --strict
          mix compile --warnings-as-errors

      - name: Test
        if: matrix.job == 'test'
        run: |
          MIX_ENV=test mix test --warnings-as-errors
          cd zig && zig build test

      - name: Dialyzer
        if: matrix.job == 'dialyzer'
        run: MIX_ENV=dev mix dialyzer

  # ── Build: cross-platform binaries ─────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [validate, ci]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux_x86_64
            artifact: minga_linux_x86_64
          - os: ubuntu-24.04-arm
            target: linux_aarch64
            artifact: minga_linux_aarch64
          - os: macos-14
            target: macos_aarch64
            artifact: minga_macos_aarch64
          - os: macos-13
            target: macos_x86_64
            artifact: minga_macos_x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: release-deps-${{ runner.os }}-${{ runner.arch }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: release-deps-${{ runner.os }}-${{ runner.arch }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - run: mix deps.get --only prod
      - run: mix release minga

      - name: Smoke test
        run: |
          binary="burrito_out/${{ matrix.artifact }}"
          chmod +x "$binary"
          version=$("$binary" --version 2>&1 || true)
          echo "Binary output: $version"
          echo "$version" | grep -q "minga"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: burrito_out/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Build: macOS GUI app bundle (.app → signed DMG) ─────────────────
  build-app:
    name: Build macOS App
    needs: [validate, ci]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: app-deps-${{ runner.os }}-${{ runner.arch }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: app-deps-${{ runner.os }}-${{ runner.arch }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ runner.os }}-${{ hashFiles('macos/Sources/**/*.swift', 'macos/Sources/**/*.metal', 'macos/project.yml') }}
          restore-keys: xcode-${{ runner.os }}-

      - run: mix deps.get --only prod

      # Build the complete Minga.app bundle (BEAM release + Xcode build + assembly)
      - name: Assemble Minga.app
        run: MIX_ENV=prod mix app.assemble

      # Locate the assembled .app bundle
      - name: Find app bundle
        id: find_app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Minga.app" -path "*/Release/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Minga.app not found in DerivedData"
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found: $APP_PATH"

      # Import Developer ID certificate into a temporary keychain
      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$DEVELOPER_ID_CERT" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$DEVELOPER_ID_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # Sign the app bundle with Developer ID (hardened runtime for notarization)
      - name: Codesign Minga.app
        run: |
          set -euo pipefail
          APP="${{ steps.find_app.outputs.app_path }}"

          # Derive the signing identity from the just-imported keychain.
          # This avoids hardcoding the developer name and fails fast if
          # the certificate import didn't work.
          IDENTITY=$(security find-identity -v -p codesigning "$keychain_path" \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application cert found in keychain"
            exit 1
          fi
          echo "Signing with: $IDENTITY"
          ENTITLEMENTS="${{ github.workspace }}/macos/Entitlements.plist"

          # Sign nested components first (per-component signing, not --deep)
          find "$APP/Contents" \( -name "*.dylib" -o -name "*.framework" \) -print0 \
            | xargs -0 -I{} codesign --force --options runtime --sign "$IDENTITY" "{}"

          # Sign executable binaries inside the BEAM release with JIT entitlements.
          # beam.smp is the binary that calls mmap(MAP_JIT); it needs the
          # entitlement in its own code signature (entitlements are process-scoped).
          # The || true skips non-Mach-O files (shell scripts, .beam bytecode).
          find "$APP/Contents/Resources/release" -type f -perm /111 -print0 \
            | xargs -0 -I{} sh -c 'codesign --force --options runtime --entitlements "'"$ENTITLEMENTS"'" --sign "'"$IDENTITY"'" "$1" 2>&1 || true' _ {}

          # Sign the main executable and the bundle itself
          codesign --force --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$APP"

          # Verify
          codesign --verify --deep --strict "$APP"
          echo "Codesign verification passed"

      # Create DMG
      - name: Create DMG
        run: |
          APP="${{ steps.find_app.outputs.app_path }}"
          DMG_PATH="$RUNNER_TEMP/Minga.dmg"

          hdiutil create \
            -volname "Minga" \
            -srcfolder "$APP" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_ENV"

      # Notarize the DMG
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$dmg_path" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket to the DMG
          xcrun stapler staple "$dmg_path"
          echo "Notarization and stapling complete"

      # Clean up keychain
      - name: Cleanup keychain
        if: always()
        run: |
          if [ -f "$keychain_path" ]; then
            security delete-keychain "$keychain_path"
          fi

      # Verify the DMG contains a valid app bundle before uploading
      - name: Smoke test DMG
        run: |
          trap 'hdiutil detach /tmp/minga-verify 2>/dev/null || true' EXIT
          hdiutil attach "$dmg_path" -mountpoint /tmp/minga-verify -nobrowse
          test -d "/tmp/minga-verify/Minga.app"
          test -f "/tmp/minga-verify/Minga.app/Contents/MacOS/Minga"
          test -d "/tmp/minga-verify/Minga.app/Contents/Resources/release"
          echo "DMG smoke test passed"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Minga_dmg
          path: ${{ env.dmg_path }}
          if-no-files-found: error

  # ── Release: create GitHub Release with all artifacts ──────────────────
  release:
    name: Create Release
    needs: [validate, build, build-app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare binaries
        run: |
          mkdir -p release-binaries

          # TUI/Burrito binaries
          for dir in release-artifacts/minga_*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release-binaries/$name"
            chmod +x "release-binaries/$name"
          done

          # macOS GUI DMG
          if [ -d "release-artifacts/Minga_dmg" ]; then
            cp release-artifacts/Minga_dmg/Minga.dmg release-binaries/Minga.dmg
          fi

          ls -lh release-binaries/

      - name: Generate checksums
        run: |
          cd release-binaries
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -exec sha256sum {} + > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          files: |
            release-binaries/minga_*
            release-binaries/Minga.dmg
            release-binaries/SHA256SUMS.txt

  # ── Update Homebrew tap with new version and hashes ────────────────────
  update-homebrew:
    name: Update Homebrew Tap
    needs: [validate, release]
    if: needs.validate.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "macos_aarch64=$(sha256sum release-artifacts/minga_macos_aarch64/minga_macos_aarch64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "macos_x86_64=$(sha256sum release-artifacts/minga_macos_x86_64/minga_macos_x86_64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_aarch64=$(sha256sum release-artifacts/minga_linux_aarch64/minga_linux_aarch64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(sha256sum release-artifacts/minga_linux_x86_64/minga_linux_x86_64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          if [ -f "release-artifacts/Minga_dmg/Minga.dmg" ]; then
            echo "dmg=$(sha256sum release-artifacts/Minga_dmg/Minga.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: jsmestad/homebrew-minga
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula and cask
        env:
          VERSION: ${{ github.ref_name }}
          SHA_MACOS_AARCH64: ${{ steps.hashes.outputs.macos_aarch64 }}
          SHA_MACOS_X86_64: ${{ steps.hashes.outputs.macos_x86_64 }}
          SHA_LINUX_AARCH64: ${{ steps.hashes.outputs.linux_aarch64 }}
          SHA_LINUX_X86_64: ${{ steps.hashes.outputs.linux_x86_64 }}
          SHA_DMG: ${{ steps.hashes.outputs.dmg }}
        run: |
          version="${VERSION#v}"

          # Generate formula
          python3 << 'PYEOF'
          import os
          v = os.environ["VERSION"].lstrip("v")
          formula = f'''# typed: false
          # frozen_string_literal: true

          class Minga < Formula
            desc "BEAM-powered modal text editor with Zig terminal renderer"
            homepage "https://github.com/jsmestad/minga"
            version "{v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/jsmestad/minga/releases/download/v#{{version}}/minga_macos_aarch64"
                sha256 "{os.environ["SHA_MACOS_AARCH64"]}"
              else
                url "https://github.com/jsmestad/minga/releases/download/v#{{version}}/minga_macos_x86_64"
                sha256 "{os.environ["SHA_MACOS_X86_64"]}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/jsmestad/minga/releases/download/v#{{version}}/minga_linux_aarch64"
                sha256 "{os.environ["SHA_LINUX_AARCH64"]}"
              else
                url "https://github.com/jsmestad/minga/releases/download/v#{{version}}/minga_linux_x86_64"
                sha256 "{os.environ["SHA_LINUX_X86_64"]}"
              end
            end

            def install
              binary = Dir["minga_*"].first
              bin.install binary => "minga"
            end

            test do
              assert_match version.to_s, shell_output("#{{bin}}/minga --version")
            end
          end
          '''
          import textwrap
          with open("homebrew-tap/Formula/minga.rb", "w") as f:
              f.write(textwrap.dedent(formula).lstrip())
          PYEOF

          # Generate cask if DMG hash is available (skipped for TUI-only releases)
          if [ -n "$SHA_DMG" ]; then
            export DMG_SHA="$SHA_DMG"

            python3 << 'PYEOF'
          import os, textwrap
          v = os.environ["VERSION"].lstrip("v")
          dmg_sha = os.environ["DMG_SHA"]
          cask = f'''cask "minga" do
            version "{v}"
            sha256 "{dmg_sha}"

            url "https://github.com/jsmestad/minga/releases/download/v#{{version}}/Minga.dmg"
            name "Minga"
            desc "BEAM-powered modal text editor with native macOS GUI"
            homepage "https://github.com/jsmestad/minga"

            app "Minga.app"
            binary "#{{appdir}}/Minga.app/Contents/Resources/bin/minga"

            zap trash: [
              "~/Library/Application Support/minga",
              "~/Library/Preferences/com.minga.editor.plist",
              "~/Library/Caches/com.minga.editor",
            ]
          end
          '''
          with open("homebrew-tap/Casks/minga.rb", "w") as f:
              f.write(textwrap.dedent(cask).lstrip())
          PYEOF
          else
            echo "No .dmg found in release, skipping cask update"
          fi

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update to ${{ github.ref_name }}"
          git push

  # ── Update CHANGELOG.md with release notes ─────────────────────────────
  update-changelog:
    name: Update Changelog
    needs: [validate, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepend release notes to CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          date=$(date -u +%Y-%m-%d)

          # Fetch auto-generated release notes from the GitHub Release
          release_body=$(gh release view "$TAG" --json body -q '.body' 2>/dev/null || echo "")
          if [ -z "$release_body" ]; then
            release_body="Release $TAG"
          fi

          export RELEASE_VERSION="$version"
          export RELEASE_DATE="$date"
          export RELEASE_BODY="$release_body"

          python3 << 'PYEOF'
          import os

          version = os.environ["RELEASE_VERSION"]
          date = os.environ["RELEASE_DATE"]
          body = os.environ["RELEASE_BODY"]

          entry = f"## [{version}] - {date}\n\n{body}\n\n"

          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          marker = "<!-- RELEASE_MARKER"
          idx = content.find(marker)
          if idx >= 0:
              content = content[:idx] + entry + content[idx:]
          else:
              # No marker; insert after the first blank line
              lines = content.split("\n", 3)
              content = lines[0] + "\n\n" + entry + "\n".join(lines[1:])

          with open("CHANGELOG.md", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "docs: update CHANGELOG.md for ${{ github.ref_name }} [skip ci]"
          git push
